name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string
env:
  HAXE_VERSION: 4.3.2
  PROJECT_NAME: PsychEngine0.7.3
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install libVLC
        if: inputs.name == 'Linux'
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Restore cache for all builds
        uses: actions/cache@v4
        with:
          key: cache-build-${{ inputs.name }}
          path: |
            ~/.gradle
            .haxelib/
            /home/runner/haxelib/
            /Users/runner/haxelib/
            C:/hostedtoolcache/windows/haxe/4.3.6/x64/lib/
            ~/.haxelib/
            export/release/android/haxe/
            export/release/android/obj/
            export/release/ios/${{ env.PROJECT_NAME }}/haxe/
            export/release/ios/${{ env.PROJECT_NAME }}/obj/
            export\release\windows\haxe\
            export\release\windows\obj\
            .haxelib\
          restore-keys: |
            cache-build-${{ inputs.name }}

      - name: Setup XCode
        if: inputs.name == 'iOS'
        uses: maxim-lobanov/setup-xcode@master
        with:
          xcode-version: '16.4'

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: hxvlc for ios only
        if: inputs.name == 'iOS'
        run: |
          haxelib remove hxCodec
          haxelib install hxvlc --quiet

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          cd export/release/ios/build/Release-iphoneos
          mkdir Payload
          mv *.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error

      - name: Clear Old Cache
        uses: actions/github-script@v7
        continue-on-error: true # Don't break the build if deletion fails
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-${{ inputs.name }}") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
            
      - name: Uploading new cache
        uses: actions/cache@v4
        with:
          # caching again since for some reason it doesnt work with the first post cache shit
          key: cache-build-${{ inputs.name }}
          path: |
            ~/.gradle
            .haxelib/
            /home/runner/haxelib/
            /Users/runner/haxelib/
            C:/hostedtoolcache/windows/haxe/4.3.6/x64/lib/
            ~/.haxelib/
            export/release/android/haxe/
            export/release/android/obj/
            export/release/ios/${{ env.PROJECT_NAME }}/haxe/
            export/release/ios/${{ env.PROJECT_NAME }}/obj/
            export\release\windows\haxe\
            export\release\windows\obj\
            .haxelib\
          restore-keys: |
            cache-build-${{ inputs.name }}
